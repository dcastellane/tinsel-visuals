<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudan Crisis Map — Blood Minerals of the Green Age</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --text: #1a1a1a;
    --text-muted: #666;
    --text-dim: #999;
    --accent-red: #d63031;
    --accent-gold: #b08d3a;
    --border: #e5e2dd;
  }

  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

  .map-container {
    max-width: 720px;
    margin: 0 auto;
    padding: 0;
    border: 1px solid var(--border);
    background: var(--surface);
  }

  .map-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
  }

  .map-header h3 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 900;
    margin-bottom: 4px;
  }

  .map-header .map-sub {
    font-size: 12px;
    color: var(--text-dim);
  }

  #map {
    width: 100%;
    height: 480px;
  }

  .map-legend {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-line {
    width: 20px;
    height: 3px;
    flex-shrink: 0;
  }

  /* Custom Leaflet overrides */
  .leaflet-popup-content-wrapper {
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
  }

  .leaflet-popup-content {
    margin: 12px 16px;
    font-size: 13px;
    line-height: 1.5;
  }

  .leaflet-popup-content .popup-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 900;
    margin-bottom: 4px;
  }

  .leaflet-popup-content .popup-stat {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 900;
    color: #d63031;
    margin: 4px 0;
  }

  .leaflet-popup-content .popup-detail {
    font-size: 12px;
    color: #666;
  }

  /* Flow arrow animation */
  .flow-path {
    stroke-dasharray: 12, 8;
    animation: flowAnimation 2s linear infinite;
  }

  @keyframes flowAnimation {
    to { stroke-dashoffset: -20; }
  }
</style>
</head>
<body>

<div class="map-container">
  <div class="map-header">
    <h3>Sudan: Crisis Zones and Gold Routes</h3>
    <div class="map-sub">Click markers for details. Animated lines show documented gold flow routes.</div>
  </div>

  <div id="map"></div>

  <div class="map-legend">
    <div class="legend-item"><div class="legend-dot" style="background:#d63031"></div> Conflict/Mining Zone</div>
    <div class="legend-item"><div class="legend-dot" style="background:#b08d3a"></div> Gold Processing Hub</div>
    <div class="legend-item"><div class="legend-dot" style="background:#4a6fa5"></div> Transit/Re-documentation</div>
    <div class="legend-item"><div class="legend-line" style="background:#d63031"></div> Gold Flow Route</div>
    <div class="legend-item"><div class="legend-dot" style="background:#666; opacity:0.5"></div> Displacement Camp Region</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// Initialize map centered on Sudan/East Africa
const map = L.map('map', {
  center: [15.5, 32.5],
  zoom: 4,
  scrollWheelZoom: false,
  zoomControl: true
});

// Use a muted, dark tile layer for gravitas
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  maxZoom: 10
}).addTo(map);

// Custom icon factory
function makeIcon(color, size = 12) {
  return L.divIcon({
    className: '',
    html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2]
  });
}

function makePulsingIcon(color, size = 16) {
  return L.divIcon({
    className: '',
    html: `<div style="position:relative;width:${size}px;height:${size}px;">
      <div style="position:absolute;inset:0;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.4);z-index:2"></div>
      <div style="position:absolute;inset:-6px;border-radius:50%;background:${color};opacity:0.3;animation:pulse 2s ease infinite"></div>
    </div>
    <style>@keyframes pulse{0%{transform:scale(1);opacity:0.3}50%{transform:scale(1.5);opacity:0.1}100%{transform:scale(1);opacity:0.3}}</style>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2]
  });
}

// === CONFLICT / MINING ZONES (red, pulsing) ===
const mines = [
  {
    lat: 14.8, lng: 25.0, // Jebel Amer, North Darfur
    title: 'Jebel Amer Gold Complex',
    stat: '~70 tonnes/yr',
    detail: "Africa's richest artisanal gold site. RSF-controlled. Forced labor including children. Mercury amalgamation without protection."
  },
  {
    lat: 13.5, lng: 24.5, // Central Darfur
    title: 'Central Darfur Mining Zone',
    stat: 'RSF-controlled',
    detail: 'Multiple artisanal mining sites under Rapid Support Forces control. Civilians depopulated from extraction areas.'
  },
  {
    lat: 11.5, lng: 29.5, // South Kordofan
    title: 'South Kordofan',
    stat: 'Active conflict',
    detail: 'Gold and mineral extraction zone. Armed groups control territory. Healthcare infrastructure 70%+ non-functional.'
  }
];

mines.forEach(m => {
  L.marker([m.lat, m.lng], { icon: makePulsingIcon('#d63031', 16) })
    .bindPopup(`<div class="popup-title">${m.title}</div><div class="popup-stat">${m.stat}</div><div class="popup-detail">${m.detail}</div>`)
    .addTo(map);
});

// === DISPLACEMENT ZONES (muted, large circles) ===
const displacement = [
  { lat: 13.6, lng: 22.4, label: 'West Darfur', pop: '2.8M displaced' },
  { lat: 15.4, lng: 32.5, label: 'Khartoum region', pop: '3.1M displaced' },
  { lat: 12.0, lng: 24.9, label: 'South Darfur', pop: '2.2M displaced' },
  { lat: 13.0, lng: 33.3, label: 'White Nile camps', pop: '1.5M displaced' },
];

displacement.forEach(d => {
  L.circle([d.lat, d.lng], {
    radius: 120000,
    color: 'rgba(214,48,49,0.3)',
    fillColor: 'rgba(214,48,49,0.1)',
    fillOpacity: 0.3,
    weight: 1
  }).bindPopup(`<div class="popup-title">${d.label}</div><div class="popup-stat">${d.pop}</div><div class="popup-detail">Displacement camp region. Families living in makeshift shelters. Children out of school. Famine conditions documented.</div>`)
    .addTo(map);
});

// === GOLD PROCESSING HUB (gold) ===
L.marker([25.2, 55.3], { icon: makePulsingIcon('#b08d3a', 18) }) // Dubai
  .bindPopup(`<div class="popup-title">Dubai, UAE</div><div class="popup-stat">40% of world's gold</div><div class="popup-detail">Processes 40% of global gold supply. Imported 29 tonnes from Sudan in 2024. No import verification required. Once refined, origin is permanently invisible.</div>`)
  .addTo(map);

// === TRANSIT HUBS (blue) ===
const transit = [
  { lat: 12.1, lng: 15.0, title: "N'Djamena, Chad", detail: 'Gold transit hub. Re-documentation with clean papers.' },
  { lat: 4.4, lng: 18.6, title: 'Bangui, CAR', detail: 'Intermediary country. Gold repackaged with clean documentation.' },
  { lat: 15.6, lng: 32.5, title: 'Khartoum', detail: 'Charter flights consolidate gold from Darfur mining zones.' },
];

transit.forEach(t => {
  L.marker([t.lat, t.lng], { icon: makeIcon('#4a6fa5', 10) })
    .bindPopup(`<div class="popup-title">${t.title}</div><div class="popup-detail">${t.detail}</div>`)
    .addTo(map);
});

// === GOLD FLOW ROUTES (animated red lines) ===
const routes = [
  // Darfur mines → Khartoum
  [[14.8, 25.0], [15.6, 32.5]],
  // Khartoum → Dubai
  [[15.6, 32.5], [25.2, 55.3]],
  // Darfur → Chad
  [[14.8, 25.0], [12.1, 15.0]],
  // Chad → CAR
  [[12.1, 15.0], [4.4, 18.6]],
  // CAR → Dubai (indirect)
  [[4.4, 18.6], [25.2, 55.3]],
];

routes.forEach(coords => {
  // Create curved path using SVG
  const line = L.polyline(coords, {
    color: '#d63031',
    weight: 2.5,
    opacity: 0.7,
    dashArray: '12, 8',
    className: 'flow-path'
  }).addTo(map);
});

// === GLOBAL MARKET ENDPOINTS (small dots) ===
const globalMarkets = [
  { lat: 51.5, lng: -0.1, label: 'London' },
  { lat: 47.4, lng: 8.5, label: 'Zurich' },
  { lat: 1.3, lng: 103.8, label: 'Singapore' },
  { lat: 22.3, lng: 114.2, label: 'Hong Kong' },
];

globalMarkets.forEach(gm => {
  L.marker([gm.lat, gm.lng], { icon: makeIcon('#999', 8) })
    .bindPopup(`<div class="popup-title">${gm.label}</div><div class="popup-detail">Global gold market. Conflict gold enters as sovereign reserves, electronics, jewelry — origin invisible.</div>`)
    .addTo(map);

  // Route from Dubai to global markets
  L.polyline([[25.2, 55.3], [gm.lat, gm.lng]], {
    color: '#b08d3a',
    weight: 1.5,
    opacity: 0.4,
    dashArray: '6, 6'
  }).addTo(map);
});

// === RUSSIA / AFRICA CORPS (small markers) ===
const russiaOps = [
  { lat: 12.6, lng: -8.0, title: 'Mali', detail: 'Africa Corps operations. Security-for-concessions model.' },
  { lat: 12.3, lng: -1.5, title: 'Burkina Faso', detail: 'Africa Corps mining concessions since 2022.' },
  { lat: 13.5, lng: 2.1, title: 'Niger', detail: 'Russian military presence. Mineral extraction agreements.' },
];

russiaOps.forEach(r => {
  L.marker([r.lat, r.lng], { icon: makeIcon('#8B0000', 8) })
    .bindPopup(`<div class="popup-title">${r.title} — Russia Africa Corps</div><div class="popup-detail">${r.detail}</div>`)
    .addTo(map);
});
</script>

</body>
</html>
